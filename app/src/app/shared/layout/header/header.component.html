<header class="app-header">
  <div class="header-left">
    <button
      type="button"
      class="icon-btn desktop-only"
      (click)="toggleSidebar.emit()"
      [attr.aria-label]="sidebarCollapsed ? 'Expand sidebar' : 'Collapse sidebar'"
    >
      <app-icon name="menu" [size]="18"></app-icon>
    </button>
    <button
      type="button"
      class="icon-btn mobile-only"
      (click)="mobileMenu.emit()"
      aria-label="Open menu"
    >
      <app-icon name="menu" [size]="18"></app-icon>
    </button>
    <div class="page-title">
      <span class="eyebrow">{{ 'app.brand' | t }}</span>
      <h1>{{ ('nav.' + activeView) | t }}</h1>
    </div>
  </div>

  <form class="command-bar" (ngSubmit)="submitCommand()">
    <span class="cmd-icon" aria-hidden="true">
      <app-icon name="sparkles" [size]="16"></app-icon>
    </span>
    <select
      class="cmd-kind"
      name="quickCaptureType"
      [(ngModel)]="quickCaptureType"
      aria-label="Capture type"
    >
      <option *ngFor="let type of quickCaptureTypes" [ngValue]="type">{{ ('quickCapture.' + type) | t }}</option>
    </select>
    <input
      class="cmd-input"
      name="commandText"
      type="text"
      [(ngModel)]="commandText"
      [placeholder]="'app.commandPlaceholder' | t"
      aria-label="Global ActionOS command"
    />
    <button type="submit" class="cmd-submit" [disabled]="!commandText.trim()">
      {{ 'common.capture' | t }}
    </button>
  </form>

  <div class="header-right">
    <button
      type="button"
      class="icon-btn"
      (click)="cycleTheme()"
      [attr.aria-label]="'Theme: ' + theme.preference()"
      [title]="'Theme: ' + theme.preference()"
    >
      <app-icon [name]="themeIcon()" [size]="18"></app-icon>
    </button>

    <div class="popover-host">
      <button
        type="button"
        class="icon-btn"
        (click)="toggleNotifications(); $event.stopPropagation()"
        [class.active]="notificationsOpen()"
        aria-label="Notifications"
      >
        <app-icon name="bell" [size]="18"></app-icon>
        <span class="dot" *ngIf="dueTodayTasks().length"></span>
      </button>
      <div class="popover popover-md" *ngIf="notificationsOpen()" (click)="$event.stopPropagation()">
        <div class="popover-head">
          <strong>Due today</strong>
          <span class="muted">{{ dueTodayTasks().length }} task(s)</span>
        </div>
        <ul class="popover-list" *ngIf="dueTodayTasks().length; else noNotifs">
          <li *ngFor="let task of dueTodayTasks().slice(0, 6)">
            <button type="button" class="popover-item" (click)="jumpToTask(task.id)">
              <span class="popover-item-title">{{ task.title }}</span>
              <span class="popover-item-meta">{{ task.board }}</span>
            </button>
          </li>
        </ul>
        <ng-template #noNotifs>
          <p class="popover-empty">Nothing on fire. Nice.</p>
        </ng-template>
      </div>
    </div>

    <div class="popover-host">
      <button
        type="button"
        class="icon-btn"
        (click)="toggleSettings(); $event.stopPropagation()"
        [class.active]="settingsOpen()"
        aria-label="Settings"
      >
        <app-icon name="settings" [size]="18"></app-icon>
      </button>
      <div class="popover popover-md" *ngIf="settingsOpen()" (click)="$event.stopPropagation()">
        <div class="popover-head"><strong>Preferences</strong></div>

        <div class="setting-row">
          <span class="setting-label">Appearance</span>
          <div class="seg">
            <button
              type="button"
              [class.active]="theme.preference() === 'light'"
              (click)="theme.setPreference('light')"
            >
              <app-icon name="sun" [size]="14"></app-icon>
              <span>Light</span>
            </button>
            <button
              type="button"
              [class.active]="theme.preference() === 'dark'"
              (click)="theme.setPreference('dark')"
            >
              <app-icon name="moon" [size]="14"></app-icon>
              <span>Dark</span>
            </button>
            <button
              type="button"
              [class.active]="theme.preference() === 'system'"
              (click)="theme.setPreference('system')"
            >
              <app-icon name="monitor" [size]="14"></app-icon>
              <span>System</span>
            </button>
          </div>
        </div>

        <div class="setting-row">
          <span class="setting-label">Language</span>
          <div class="seg">
            <button
              *ngFor="let lang of i18n.languages"
              type="button"
              [class.active]="i18n.language === lang.code"
              (click)="setLanguage(lang.code)"
            >
              <span>{{ lang.nativeLabel }}</span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="popover-host">
      <button
        type="button"
        class="user-chip"
        (click)="toggleUserMenu(); $event.stopPropagation()"
        [class.active]="userMenuOpen()"
        aria-haspopup="menu"
      >
        <span class="user-avatar">{{ initials() }}</span>
        <span class="user-text">
          <span class="user-name">{{ currentMember()?.name || 'You' }}</span>
          <span class="user-role">{{ currentMember()?.role || 'Member' }}</span>
        </span>
        <app-icon name="chevron-down" [size]="14"></app-icon>
      </button>
      <div class="popover popover-lg" *ngIf="userMenuOpen()" (click)="$event.stopPropagation()">
        <div class="user-card">
          <span class="user-avatar large">{{ initials() }}</span>
          <div>
            <strong>{{ currentMember()?.name || 'You' }}</strong>
            <small>{{ currentMember()?.role }} · {{ currentMember()?.team }}</small>
          </div>
        </div>
        <div class="popover-divider"></div>
        <button class="popover-row" (click)="go('my-work')">
          <app-icon name="check-square" [size]="16"></app-icon>
          <span>My Work</span>
        </button>
        <button class="popover-row" (click)="toggleSettings()">
          <app-icon name="settings" [size]="16"></app-icon>
          <span>Preferences</span>
        </button>
        <div class="popover-divider"></div>
        <button class="popover-row subtle" (click)="resetDemo()">
          <app-icon name="sparkles" [size]="16"></app-icon>
          <span>{{ 'app.resetDemo' | t }}</span>
        </button>
        <button class="popover-row danger" (click)="clearAll()">
          <app-icon name="trash" [size]="16"></app-icon>
          <span>{{ 'app.clearAll' | t }}</span>
        </button>
      </div>
    </div>
  </div>
</header>
