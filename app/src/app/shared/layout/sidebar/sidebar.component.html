<div class="sidebar-backdrop" (click)="closeMobile.emit()" aria-hidden="true"></div>

<aside class="sidebar" [class.collapsed]="collapsed">
  <div class="brand">
    <div class="brand-mark" aria-hidden="true">AO</div>
    <div class="brand-text" *ngIf="!collapsed">
      <strong>{{ 'app.brand' | t }}</strong>
      <span>{{ 'app.tagline' | t }}</span>
    </div>
  </div>

  <nav class="nav-list" aria-label="ActionOS sections">
    <button
      *ngFor="let item of navItems"
      type="button"
      class="nav-item"
      [class.active]="activeView === item.id"
      (click)="selectView(item.id)"
      [attr.title]="collapsed ? (('nav.' + item.id) | t) : null"
      [attr.aria-label]="('nav.' + item.id) | t"
    >
      <span class="nav-icon">
        <app-icon [name]="iconFor(item.id)" [size]="18"></app-icon>
      </span>
      <span class="nav-label" *ngIf="!collapsed">{{ ('nav.' + item.id) | t }}</span>
      <span class="nav-shortcut" *ngIf="!collapsed" aria-hidden="true">{{ item.shortcut }}</span>
    </button>
  </nav>

  <section class="workspace-card" *ngIf="!collapsed">
    <span class="eyebrow">{{ 'app.workspace' | t }}</span>
    <h2>{{ 'app.workspaceName' | t }}</h2>
    <p>{{ 'app.workspaceDescription' | t }}</p>
  </section>

  <button
    type="button"
    class="collapse-toggle"
    (click)="toggleCollapsed.emit()"
    [attr.aria-label]="collapsed ? 'Expand sidebar' : 'Collapse sidebar'"
  >
    <app-icon [name]="collapsed ? 'chevron-right' : 'chevron-left'" [size]="16"></app-icon>
    <span *ngIf="!collapsed">Collapse</span>
  </button>
</aside>
