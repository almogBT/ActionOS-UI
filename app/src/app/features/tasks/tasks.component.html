<section class="screen tasks-screen">

  <!-- ── Header ──────────────────────────────────────────────────────────── -->
  <div class="screen-title">
    <div>
      <span class="eyebrow">{{ 'tasks.eyebrow' | t }}</span>
      <h2>{{ 'tasks.title' | t }}</h2>
      <p class="screen-sub">{{ 'tasks.subtitle' | t }}</p>
    </div>
    <button type="button" class="ghost-action" (click)="openView('my-work')">{{ 'tasks.openMyWork' | t }}</button>
  </div>

  <!-- ── Expandable calendar (tasks only) ────────────────────────────────── -->
  <div class="tasks-cal-panel">
    <app-calendar
      [events]="taskCalendarEvents"
      (eventOpened)="onCalendarEventOpened($event)"
    ></app-calendar>
  </div>

  <!-- ── Stat tiles (clickable → popup list) ─────────────────────────────── -->
  <div class="stat-tile-row">
    <app-stat-tile
      icon="check-square" [value]="openCount" [label]="'tasks.tiles.open' | t"
      [zero]="openCount === 0" (tileClick)="openTile('open')"
    ></app-stat-tile>
    <app-stat-tile
      icon="alert-triangle" [value]="overdueCount" [label]="'tasks.tiles.overdue' | t"
      tone="danger" [zero]="overdueCount === 0" (tileClick)="openTile('overdue')"
    ></app-stat-tile>
    <app-stat-tile
      icon="calendar" [value]="todayCount" [label]="'tasks.tiles.today' | t"
      [zero]="todayCount === 0" (tileClick)="openTile('today')"
    ></app-stat-tile>
    <app-stat-tile
      icon="bell" [value]="blockedCount" [label]="'tasks.tiles.blocked' | t"
      [zero]="blockedCount === 0" (tileClick)="openTile('blocked')"
    ></app-stat-tile>
  </div>

  <!-- ── Controls: audience filter · origin · search ─────────────────────── -->
  <div class="tasks-controls">
    <div class="filter-strip">
      <button
        *ngFor="let f of audienceOptions"
        type="button"
        [class.active]="audience === f.id"
        (click)="audience = f.id"
      >{{ f.labelKey | t }}</button>
    </div>

    <div class="controls-right">
      <select class="origin-select" [(ngModel)]="origin" [attr.aria-label]="'tasks.origin.label' | t">
        <option *ngFor="let o of originOptions" [value]="o.id">{{ o.labelKey | t }}</option>
      </select>
      <input
        type="search"
        class="tasks-search"
        [(ngModel)]="search"
        [placeholder]="'tasks.searchPlaceholder' | t"
      />
    </div>
  </div>

  <!-- ── The one shared task table ───────────────────────────────────────── -->
  <app-task-table
    [tasks]="filteredTasks"
    groupBy="due"
    [showGroupSwitch]="true"
  ></app-task-table>

  <!-- ── Stat tile popup ─────────────────────────────────────────────────── -->
  <app-metric-tasks-modal
    *ngIf="openLens"
    [title]="lensTitleKey"
    mode="tasks"
    [tasks]="lensBoardTasks"
    [meetingTasks]="lensMeetingTasks"
    [hideFilters]="true"
    (close)="closeTile()"
  ></app-metric-tasks-modal>

</section>
