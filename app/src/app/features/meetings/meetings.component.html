<section class="screen meetings-screen">

  <!-- ── Header ──────────────────────────────────────────────────────────── -->
  <div class="screen-title">
    <div>
      <!-- Page title lives in the top navbar already; only the descriptive
           subtitle remains here to avoid three stacked "פגישות" headings. -->
      <p class="screen-subtitle">{{ 'meetingsOverview.subtitle' | t }}</p>
    </div>
    <div class="topbar-actions">
      <button type="button" class="primary-action" (click)="newMeeting()">
        + {{ 'meetingsOverview.newMeeting' | t }}
      </button>
    </div>
  </div>

  <!-- ── Calendar + KPI tiles (shared seamless card) ──────────────────────── -->
  <app-calendar-stats
    [events]="meetingCalendarEvents"
    (eventOpened)="onCalendarEventOpened($event)"
    (slotSelected)="onCalendarSlotSelected($event)"
  >
    <app-stat-tile
      icon="calendar" [value]="getLane('upcoming').length" [label]="'meetingsOverview.upcoming' | t"
      [zero]="getLane('upcoming').length === 0" (tileClick)="openTile('upcoming')"
    ></app-stat-tile>
    <app-stat-tile
      icon="check-circle" [value]="getLane('in-progress').length" [label]="'meetingsOverview.inProgress' | t"
      [zero]="getLane('in-progress').length === 0" (tileClick)="openTile('in-progress')"
    ></app-stat-tile>
    <app-stat-tile
      icon="check-square" [value]="openMeetingTasksCount" [label]="'meetingsOverview.openMeetingTasks' | t"
      [zero]="openMeetingTasksCount === 0" (tileClick)="openTile('open-tasks')"
    ></app-stat-tile>
  </app-calendar-stats>

  <!-- ── Needs-your-attention carousel ───────────────────────────────────── -->
  <section *ngIf="features.meetingsAttentionRail && attentionMeetings.length" class="attention-rail">
    <div class="rail-header">
      <app-icon name="alert-triangle" [size]="15"></app-icon>
      <span class="rail-title">{{ 'meetingsOverview.needsAttention' | t }}</span>
      <span class="rail-count">{{ attentionMeetings.length }}</span>
      <span class="rail-hint">{{ 'meetingsOverview.needsAttentionHint' | t }}</span>
      <div class="rail-nav" *ngIf="attentionMeetings.length > 1">
        <button type="button" class="rail-arrow" (click)="scrollRail(railTrack, -1)"
          [attr.aria-label]="'meetingsOverview.scrollPrev' | t">‹</button>
        <button type="button" class="rail-arrow" (click)="scrollRail(railTrack, 1)"
          [attr.aria-label]="'meetingsOverview.scrollNext' | t">›</button>
      </div>
    </div>
    <div class="carousel-track" #railTrack (wheel)="onRailWheel($event, railTrack)">
      <app-meeting-card *ngFor="let m of attentionMeetings; trackBy: trackMeeting" [meeting]="m" variant="rail"></app-meeting-card>
    </div>
  </section>

  <!-- ── Filter + search controls (single row) ────────────────────────────── -->
  <section class="panel">
    <div class="meetings-controls">
      <input
        type="search"
        class="meetings-search"
        [(ngModel)]="search"
        [placeholder]="'meetingsOverview.searchPlaceholder' | t"
      />
      <app-searchable-select
        [(ngModel)]="customerFilter"
        [options]="customerFilterOptions"
        class="filter-select"
      ></app-searchable-select>
      <div class="filter-strip">
        <button
          *ngFor="let f of quickFilterOptions; trackBy: trackQuickFilter"
          type="button"
          [class.active]="quickFilter === f.id"
          (click)="quickFilter = f.id"
        >{{ f.labelKey | t }}</button>
      </div>
    </div>

    <!-- ── Meeting lanes (card grids) ─────────────────────────────────────── -->
    <div *ngFor="let bucket of buckets; trackBy: trackBucket" class="lane-section" [class.collapsed]="isLaneCollapsed(bucket.lane)">
      <button
        type="button"
        class="lane-header"
        (click)="toggleLane(bucket.lane)"
        [attr.aria-expanded]="!isLaneCollapsed(bucket.lane)"
      >
        <app-icon class="lane-chevron" name="chevron-down" [size]="14"></app-icon>
        <span class="lane-label">{{ bucket.labelKey | t }}</span>
        <span class="lane-count">{{ bucket.meetings.length }}</span>
      </button>

      <!-- Body is only rendered when expanded — collapsed lanes cost nothing. -->
      <div *ngIf="!isLaneCollapsed(bucket.lane)" class="lane-body">
        <div *ngIf="!bucket.meetings.length" class="lane-empty">
          <p>{{ 'meetingsOverview.noMeetingsInLane' | t }}</p>
          <button
            *ngIf="hasActiveFilters"
            type="button"
            class="ghost-action"
            (click)="clearFilters()"
          >{{ 'meetingsOverview.clearFilters' | t }}</button>
        </div>

        <div *ngIf="bucket.meetings.length" class="card-grid">
          <app-meeting-card *ngFor="let m of bucket.meetings; trackBy: trackMeeting" [meeting]="m"></app-meeting-card>
        </div>
      </div>
    </div>
  </section>

  <!-- ── Tile popup: shared stat-modal shell ─────────────────────────────── -->
  <app-stat-modal
    *ngIf="openLens"
    [eyebrow]="'meetingsOverview.eyebrow' | t"
    [title]="lensTitleKey | t"
    [closeLabel]="'common.close' | t"
    (close)="closeTile()"
  >
    <!-- Open Tasks lens -->
    <app-stat-tasks-view
      *ngIf="openLens === 'open-tasks'"
      [tasks]="openMeetingTasks"
      [emptyText]="'home.noMatches' | t"
      (rowOpened)="closeTile()"
    ></app-stat-tasks-view>

    <!-- Upcoming / In-progress meetings lens -->
    <app-stat-meetings-view
      *ngIf="openLens !== 'open-tasks'"
      [meetings]="lensMeetings"
      [emptyText]="'home.noMatches' | t"
      (meetingOpened)="closeTile()"
    ></app-stat-meetings-view>
  </app-stat-modal>

</section>
