<section class="home-screen">
  <!-- HERO + NAV TILES (one connected card) -->
  <div class="home-hero-card">
    <!-- HERO ("mood" tile) — header of the card -->
    <header class="home-hero">
      <div class="hero-text">
        <span class="hero-eyebrow">{{ todayLabel() }}</span>
        <h1>{{ greeting() }}, {{ firstName() }}.</h1>
        <p>{{ summaryLine() }}</p>
      </div>
      <div class="hero-actions">
        <button type="button" class="primary-action" (click)="openView('my-work')">
          <app-icon name="check-square" [size]="14"></app-icon>
          <span>{{ 'home.planMyDay' | t }}</span>
        </button>
        <button type="button" class="ghost-action" (click)="openView('inbox')">
          <app-icon name="inbox" [size]="14"></app-icon>
          <span>{{ 'home.triageInbox' | t }}</span>
        </button>
      </div>
    </header>

    <!-- NAV TILES — attached footer segments of the card -->
    <nav class="home-nav-tiles" aria-label="Navigate to section">
      <button
        *ngFor="let item of navTiles"
        type="button"
        class="nav-tile"
        (click)="openView(item.id)"
      >
        <span class="nav-tile-icon">
          <app-icon [name]="iconFor(item.id)" [size]="22"></app-icon>
        </span>
        <span class="nav-tile-label">{{ ('nav.' + item.id) | t }}</span>
      </button>
    </nav>
  </div>

  <!-- TEAM CALENDAR + METRICS (shared seamless card) -->
  <!-- Metrics are now standard stat tiles for a consistent look app-wide; the
       click targets (openMetricModal) and the team-calendar people filter are
       unchanged. The filter strip is forwarded into the calendar header. -->
  <app-calendar-stats
    [events]="homeCalEvents()"
    [hasFilter]="true"
    (eventOpened)="onHomeCalEventOpened($event)"
    (slotSelected)="onHomeCalSlotSelected($event)"
  >
    <div calendarFilters class="filter-strip">
      <button type="button" [class.active]="homeCalFilter() === 'all'"
        (click)="homeCalFilter.set('all')">{{ 'home.calendar.filterAll' | t }}</button>
      <button type="button" [class.active]="homeCalFilter() === 'my-work'"
        (click)="homeCalFilter.set('my-work')">{{ 'home.calendar.filterMyWork' | t }}</button>
      <button type="button" [class.active]="homeCalFilter() === 'i-opened'"
        (click)="homeCalFilter.set('i-opened')">{{ 'home.calendar.filterIOpened' | t }}</button>
      <button type="button" [class.active]="homeCalFilter() === 'opened-for-me'"
        (click)="homeCalFilter.set('opened-for-me')">{{ 'home.calendar.filterOpenedForMe' | t }}</button>
      <button type="button" [class.active]="homeCalFilter() === 'by-employee'"
        (click)="homeCalFilter.set('by-employee')">{{ 'home.calendar.filterByEmployee' | t }}</button>
      <select
        *ngIf="homeCalFilter() === 'by-employee'"
        class="filter-select"
        [ngModel]="homeCalEmpId()"
        (ngModelChange)="homeCalEmpId.set($event)"
      >
        <option value="">{{ 'home.calendar.selectEmployee' | t }}</option>
        <option *ngFor="let e of workspace.employees" [value]="e.id">{{ e.fullName }}</option>
      </select>
    </div>

    <app-stat-tile
      icon="check-square" [value]="workspace.openOperationalTaskCount" [label]="'home.openWork' | t"
      [zero]="workspace.openOperationalTaskCount === 0" (tileClick)="openMetricModal('open')"
    ></app-stat-tile>
    <app-stat-tile
      icon="alert-triangle" [value]="workspace.overdueOperationalTaskCount" [label]="'home.overdue' | t"
      [tone]="workspace.overdueOperationalTaskCount > 0 ? 'danger' : 'normal'"
      [zero]="workspace.overdueOperationalTaskCount === 0" (tileClick)="openMetricModal('overdue')"
    ></app-stat-tile>
    <app-stat-tile
      icon="bell" [value]="workspace.blockedOperationalTaskCount" [label]="'home.blocked' | t"
      [zero]="workspace.blockedOperationalTaskCount === 0" (tileClick)="openMetricModal('blocked')"
    ></app-stat-tile>
  </app-calendar-stats>

  <!-- Calendar time-box → choose meeting or task -->
  <app-calendar-create-picker
    [slot]="createSlot()"
    (chooseMeeting)="createMeetingAt($event)"
    (chooseTask)="createTaskAt($event)"
    (cancel)="createSlot.set(null)"
  ></app-calendar-create-picker>

  <!-- BOARD PREVIEW POPUP -->
  <app-board-preview-modal
    *ngIf="boardPreview as preview"
    [entityType]="preview.type"
    [entityId]="preview.id"
    [entityName]="preview.name"
    (close)="closeBoardPreview()"
    (openFullProfile)="openClientFullProfile(preview.id)"
    (newMeeting)="onNewMeeting()"
    (prepareMeeting)="onPrepareMeeting()"
  ></app-board-preview-modal>

  <!-- METRIC POPUP -->
  <app-metric-tasks-modal
    *ngIf="activeMetric() as m"
    [title]="m.title"
    [mode]="m.mode"
    [tasks]="m.tasks"
    [meetingTasks]="m.meetingTasks"
    [notes]="m.notes"
    (close)="closeMetricModal()"
  ></app-metric-tasks-modal>

  <!-- CLIENTS + WORKLOAD -->
  <div class="two-column">
    <app-customer-list
      (viewBoard)="openClientBoard($event)"
      (openCustomer)="openCustomer.emit($event)"
    ></app-customer-list>

    <section class="panel team-load">
      <div class="panel-header">
        <div>
          <span class="section-eyebrow">{{ 'home.teamLoadEyebrow' | t }}</span>
          <h2>{{ 'home.ownersAndBlockers' | t }}</h2>
        </div>
      </div>

      <input
        type="search"
        class="home-search"
        [(ngModel)]="workloadSearch"
        [placeholder]="'home.searchPlaceholder' | t"
      />

      <div class="workload-filters">
        <button type="button" class="filter-chip" [class.active]="workloadFilter === 'all'" (click)="workloadFilter = 'all'">{{ 'home.metricFilters.all' | t }}</button>
        <button type="button" class="filter-chip" [class.active]="workloadFilter === 'assigned-by-me'" (click)="workloadFilter = 'assigned-by-me'">{{ 'home.metricFilters.opened' | t }}</button>
        <button type="button" class="filter-chip" [class.active]="workloadFilter === 'assigned-me'" (click)="workloadFilter = 'assigned-me'">{{ 'home.metricFilters.assignedToMeByOthers' | t }}</button>
        <button type="button" class="filter-chip" [class.active]="workloadFilter === 'met-with-me'" (click)="workloadFilter = 'met-with-me'">{{ 'home.metWithMe' | t }}</button>
      </div>

      <div class="load-list" *ngIf="filteredWorkload.length; else noWorkload">
        <button
          *ngFor="let workload of filteredWorkload"
          type="button"
          class="load-row"
          (click)="openMemberBoard(workload.member.id, workload.member.name)"
        >
          <span class="avatar" [style.--tint-h]="avatarHue(workload.member.name)">
            {{ workspace.initials(workload.member.id) }}
          </span>
          <div class="load-body">
            <div class="load-head">
              <strong>{{ workload.member.name }}</strong>
              <span class="load-counts">
                {{ openTotal(workload) }} {{ 'home.openShort' | t }}
                <em *ngIf="blockedTotal(workload)" class="blocked">· {{ blockedTotal(workload) }} {{ 'home.blockedShort' | t }}</em>
              </span>
            </div>
            <div class="load-bar" *ngIf="loadTotal(workload); else noLoadBar">
              <span class="seg open"    [style.width.%]="openTotal(workload) / maxLoad * 100"></span>
              <span class="seg blocked" [style.width.%]="blockedTotal(workload) / maxLoad * 100"></span>
            </div>
            <ng-template #noLoadBar>
              <span class="load-empty">{{ 'home.noLoad' | t }}</span>
            </ng-template>
          </div>
        </button>
      </div>
      <ng-template #noWorkload>
        <div class="empty-state"><strong>{{ 'home.noMatches' | t }}</strong></div>
      </ng-template>
    </section>
  </div>

</section>
